<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pourquoi je t'aime, Maman 💖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Open+Sans:wght@400;600&family=Caveat:wght@500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: linear-gradient(135deg, #fff0f6 0%, #ffd6e8 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: #3d1a2e;
    }

    #petals {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .home-btn {
      position: fixed;
      top: 20px; left: 20px;
      background: rgba(255,255,255,0.92);
      width: 50px; height: 50px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(214,51,132,0.15);
      z-index: 100;
      transition: transform 0.3s, background 0.3s;
    }
    .home-btn:hover { transform: scale(1.1); background: #fff; }

    header {
      text-align: center;
      padding: 70px 20px 16px;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeInDown 1s ease-out 0.2s forwards;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      background: linear-gradient(to right, #d63384, #ff85a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 2px 10px rgba(214,51,132,0.15));
    }
    header p {
      margin-top: 10px;
      font-size: 1rem;
      color: #b06080;
      font-style: italic;
    }

    /* ── Progress ── */
    .progress-wrap {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 28px auto 0;
      padding: 0 20px;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.5s forwards;
    }
    .progress-label {
      font-size: 0.85rem;
      color: #c06090;
      margin-bottom: 8px;
      text-align: center;
    }
    .progress-bar-bg {
      background: rgba(255,255,255,0.55);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      border: 1px solid rgba(214,51,132,0.18);
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #d63384, #ff85a1);
      transition: width 0.8s ease;
    }

    /* ── Grid ── */
    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 18px;
      max-width: 820px;
      margin: 32px auto 60px;
      padding: 0 20px;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.7s forwards;
    }

    .card-wrap {
      perspective: 1000px;
      height: 210px;
    }

    .flipcard {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
    }
    .flipcard.flipped  { transform: rotateY(180deg); }
    .flipcard.unlocked { cursor: pointer; }
    .flipcard.locked   { cursor: not-allowed; }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 14px;
    }

    /* Unlocked front */
    .card-front {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,182,210,0.6);
      box-shadow: 0 8px 28px rgba(214,51,132,0.12);
    }
    .day-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #d63384;
      opacity: 0.8;
      margin-bottom: 4px;
    }
    .day-num {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      font-weight: 600;
      color: rgba(214,51,132,0.18);
      line-height: 1;
    }
    .day-date {
      font-size: 0.73rem;
      color: #c899b0;
      margin-top: 8px;
    }
    .flip-hint {
      margin-top: 10px;
      font-size: 0.7rem;
      color: #f0b8d0;
      display: flex; align-items: center; gap: 4px;
    }
    .spin { display: inline-block; animation: spin 3s ease-in-out infinite; }
    @keyframes spin { 0%,100%{transform:rotateY(0)} 50%{transform:rotateY(180deg)} }

    /* Locked front */
    .card-front.is-locked {
      background: rgba(255,240,248,0.65);
      border: 1px solid rgba(240,190,220,0.4);
      box-shadow: 0 4px 14px rgba(214,51,132,0.05);
    }
    .lock-icon    { font-size: 1.5rem; opacity: 0.3; margin-bottom: 8px; }
    .locked-num   { font-family:'Playfair Display',serif; font-size:2.8rem; color:rgba(214,51,132,0.1); line-height:1; }
    .locked-date  { font-size:0.7rem; color:#ddb0c8; margin-top:8px; }

    /* Back */
    .card-back {
      background: linear-gradient(145deg, #b82e72 0%, #d63384 50%, #ff85a1 100%);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 28px rgba(214,51,132,0.3);
      transform: rotateY(180deg);
    }
    .back-day  { font-size:0.68rem; color:rgba(255,255,255,0.5); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:10px; }
    .back-text { font-family:'Caveat',cursive; font-size:1.13rem; color:#fff; line-height:1.5; text-align:center; }
    .back-heart{ margin-top:12px; font-size:1.2rem; opacity:0.6; }

    footer {
      text-align: center;
      padding: 0 20px 50px;
      color: #c06090;
      font-size: 0.88rem;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1s ease-out 1s forwards;
    }
    footer a {
      display: inline-block;
      margin-top: 16px;
      background: linear-gradient(135deg, #d63384, #ff85a1);
      color: white;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      transition: opacity 0.3s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(214,51,132,0.3);
    }
    footer a:hover { opacity: 0.88; transform: translateY(-2px); }

    @keyframes fadeIn     { from{opacity:0} to{opacity:1} }
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes heartbeat  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }

    @media(max-width:480px){
      header h1 { font-size:1.85rem; }
      .grid { grid-template-columns:repeat(2,1fr); gap:12px; }
      .card-wrap { height:190px; }
    }
  </style>
</head>
<body>

  <canvas id="petals"></canvas>
  <a href="index.html" class="home-btn" title="Retour à l'accueil">🏠</a>

  <header>
    <h1>Pourquoi je t'aime, Maman <span style="display:inline-block;animation:heartbeat 1.5s infinite">💖</span></h1>
    <p>Une nouvelle raison se débloque chaque jour maman&nbsp; 🌸</p>
  </header>

  <div class="progress-wrap">
    <p class="progress-label" id="progress-label">0 / 17 découvertes</p>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <p>Parce qu'il y a mille raisons de t'aimer, Maman 💖</p>
    <a href="index.html">← Retour à la page principale</a>
  </footer>

  <script>
    // ── CONFIG ──────────────────────────────────────────────
    const START_DATE = new Date('2026-04-22T00:00:00'); // Jour 1 = 22 avril
    const TOTAL      = 17;

    // 🌸 Remplace ces raisons par celles pour Maman
    const reasons = [
      "Première pour la route, juste pour te dire que je t'aime toujours aussi fort même si je le dis pas assez.",
      "Pour m'avoir appris et transmis des valeurs que je suis fier de représenter.",
      "Pour tous les moments qu'on a partagés ensemble, les petits comme les grands.",
      "Pour ne jamais avoir lâché, même dans les moments un peu plus durs.",
      "Pour ton exemple silencieux qui veut beaucoup dire, t'es un vrai modèle pour moi.",
      "Pour m'avoir transmis ton amour de la vie pendant ma jeunesse, que j'ai gardé et amplifié.",
      "Pour les voyages qu'on a faits, et ceux qu'on fera dans le futur peut-être.",
      "Pour ta façon d'être là quand ça compte et de montrer que tu tiens à moi.",
      "Pour m'avoir appris à me relever quand ça allait pas.",
      "Pour ton grand sourire sur les photos qu'on a ensemble, j'adore.",
      "Pour m'avoir transmis quelques-unes de tes passions.",
      "Pour tous les instants simples qui sont devenus des souvenirs vraiment sympas.",
      "Parce que t'es ma Maman, et ça suffit à tout.",
      "Pour chaque fois que tu as cru en moi avant moi-même.",
      "Pour m'avoir donné le goût des belles choses dans la vie.",
      "Parce que je suis fier d'être ton fils, pour toujours. 💖",
      "Pour ce soir où je rentre enfin à la maison.",
    ];

    const MONTHS = ['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];
    const fmt = d => `${d.getDate()} ${MONTHS[d.getMonth()]}`;

    function unlockedCount() {
      const now   = new Date(); now.setHours(0,0,0,0);
      const start = new Date(START_DATE); start.setHours(0,0,0,0);
      const diff  = Math.floor((now - start) / 86400000) + 1;
      return Math.min(Math.max(diff, 0), TOTAL);
    }

    const isFlipped   = i => localStorage.getItem('maman_day_' + i) === '1';
    const markFlipped = i => localStorage.setItem('maman_day_' + i, '1');

    const grid     = document.getElementById('grid');
    const unlocked = unlockedCount();
    let   flippedTotal = 0;

    for (let i = 0; i < TOTAL; i++) {
      const dayNum  = i + 1;
      const dayDate = new Date(START_DATE);
      dayDate.setDate(dayDate.getDate() + i);
      const ok      = i < unlocked;
      const already = ok && isFlipped(i);
      if (already) flippedTotal++;

      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';

      const card = document.createElement('div');
      card.className = 'flipcard ' + (ok ? 'unlocked' : 'locked');
      if (already) card.classList.add('flipped');

      const front = document.createElement('div');
      front.className = 'card-face card-front' + (ok ? '' : ' is-locked');
      if (ok) {
        front.innerHTML = `
          <div class="day-label">Jour</div>
          <div class="day-num">${String(dayNum).padStart(2,'0')}</div>
          <div class="day-date">${fmt(dayDate)}</div>
          <div class="flip-hint"><span class="spin">↻</span> Retourner</div>`;
      } else {
        front.innerHTML = `
          <div class="lock-icon">🔒</div>
          <div class="locked-num">${String(dayNum).padStart(2,'0')}</div>
          <div class="locked-date">Dispo le ${fmt(dayDate)}</div>`;
      }

      const back = document.createElement('div');
      back.className = 'card-face card-back';
      back.innerHTML = `
        <div class="back-day">Jour ${dayNum}</div>
        <div class="back-text">${reasons[i]}</div>
        <div class="back-heart">💖</div>`;

      card.appendChild(front);
      card.appendChild(back);
      wrap.appendChild(card);
      grid.appendChild(wrap);

      if (ok) {
        card.addEventListener('click', () => {
          const wasFlipped = card.classList.contains('flipped');
          card.classList.toggle('flipped');
          if (!wasFlipped) { markFlipped(i); flippedTotal++; renderProgress(); }
        });
      }
    }

    function renderProgress() {
      const pct = Math.round(flippedTotal / TOTAL * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent =
        `${flippedTotal} / ${TOTAL} découvertes`;
    }
    renderProgress();

    // ✨ Pétales (animation similaire à maman/index)
    const canvas = document.getElementById("petals");
    const ctx    = canvas.getContext("2d");
    let W = window.innerWidth, H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    const petals = [];
    for (let i = 0; i < 80; i++) petals.push({
      x: Math.random()*W, y: Math.random()*H,
      size: Math.random()*5+2, speedY: Math.random()*0.9+0.4,
      speedX: Math.random()*0.6-0.3,
      opacity: Math.random()*0.5+0.35,
      rotation: Math.random()*360,
      rotationSpeed: Math.random()*2-1
    });
    function drawPetals() {
      ctx.clearRect(0,0,W,H);
      petals.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rotation*Math.PI)/180);
        const g = ctx.createRadialGradient(0,0,0,0,0,p.size*1.8);
        g.addColorStop(0, `rgba(255,182,210,${p.opacity+0.2})`);
        g.addColorStop(0.5,`rgba(255,130,180,${p.opacity*0.6})`);
        g.addColorStop(1,   `rgba(255,182,193,0)`);
        ctx.beginPath();
        ctx.ellipse(0,0,p.size,p.size/1.7,0,0,Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        ctx.restore();
        p.y += p.speedY; p.x += p.speedX; p.rotation += p.rotationSpeed;
        if (p.y > H+10){ p.y=-10; p.x=Math.random()*W; }
        if (p.x>W) p.x=0; if(p.x<0) p.x=W;
      });
      requestAnimationFrame(drawPetals);
    }
    drawPetals();
    window.addEventListener("resize",()=>{ W=window.innerWidth; H=window.innerHeight; canvas.width=W; canvas.height=H; });
  </script>
</body>
</html>
